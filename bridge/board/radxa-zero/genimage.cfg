# genimage: assemble output/images/sdcard.img.
# Amlogic SD layout: the signed bootloader blob lives at a raw offset (NOT a partition), then a FAT
# boot partition (kernel + dtb + boot.scr) and an ext4 rootfs.

image boot.vfat {
	vfat {
		files = {
			"Image",                           # kernel
			"meson-g12a-radxa-zero.dtb",       # device tree
			"boot.scr",                        # compiled U-Boot boot script
		}
	}
	size = 64M
}

image sdcard.img {
	hdimage {
		partition-table-type = "mbr"
	}

	# Amlogic bootloader, written from sector 1 (offset 512) — does not touch the MBR in sector 0.
	# NOTE(bring-up): if first boot fails, this offset is the prime suspect to verify for the S905Y2.
	partition bootloader {
		in-partition-table = false
		image = "u-boot.bin.sd.bin"
		offset = 512
	}

	partition boot {
		partition-type = 0xC                   # FAT32 (LBA)
		bootable = true
		image = "boot.vfat"
		offset = 16M                           # clear of the bootloader blob
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext4"
	}
}
