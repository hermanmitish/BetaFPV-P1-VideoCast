# genimage layout for the ArtLynk bridge SD card.
# Amlogic SD: signed bootloader blob at a raw offset (sector 1), then a FAT boot partition
# (kernel + dtb + boot.scr) and an ext4 rootfs. (No comments inside braces/lists below — genimage's
# parser only accepts # comments at the top level.)

image boot.vfat {
	vfat {
		files = {
			"Image",
			"meson-g12a-radxa-zero.dtb",
			"boot.scr"
		}
	}
	size = 64M
}

image sdcard.img {
	hdimage {
		partition-table-type = "mbr"
	}

	partition boot {
		partition-type = 0xc
		bootable = true
		image = "boot.vfat"
		offset = 16M
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext2"
	}
}
